name: Morning Digest

on:
  schedule:
    # รันหลายรอบช่วงเช้า (รอ Oura sync) — ส่งครั้งเดียวเมื่อข้อมูลพร้อม (กันซ้ำผ่าน KV)
    - cron: '0,30 23 * * *'   # 06:00, 06:30 ICT
    - cron: '0,30 0-2 * * *'  # 07:00–09:30 ICT
  workflow_dispatch:           # กดรันมือได้ (force ส่งทันที ข้าม gate)

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Check required secrets
        env:
          OURA_TOKEN:          ${{ secrets.OURA_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          missing=0
          for name in OURA_TOKEN TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"
      - run: pip install requests garminconnect python-dotenv
      - run: python morning_digest.py
        env:
          OURA_TOKEN:           ${{ secrets.OURA_TOKEN }}
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GARMIN_TOKENS:        ${{ secrets.GARMIN_TOKENS }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_SECRET:        ${{ secrets.DIGEST_SECRET }}
